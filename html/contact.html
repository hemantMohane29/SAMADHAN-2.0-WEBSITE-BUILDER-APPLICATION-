<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | High-Tech Glowing Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c0c1d, #1a1a2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 20px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3.5rem;
            background: linear-gradient(90deg, #00ffff, #0080ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .header p {
            font-size: 1.2rem;
            color: #a0a0c0;
        }

        .contact-form, .contact-info {
            background: rgba(20, 20, 40, 0.7);
            border-radius: 15px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .contact-form::before, .contact-info::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                rgba(0, 255, 255, 0.8), 
                transparent 30%
            );
            animation: rotate 6s linear infinite;
            z-index: -1;
        }

        .contact-info::before {
            background: conic-gradient(
                transparent, 
                rgba(0, 128, 255, 0.8), 
                transparent 30%
            );
        }

        .contact-form::after, .contact-info::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: rgba(20, 20, 40, 0.9);
            border-radius: 12px;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .contact-form:hover::before, .contact-info:hover::before {
            animation-duration: 3s;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #00ffff;
            display: flex;
            align-items: center;
        }

        h2 i {
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0c0;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(90deg, #00ffff, #0080ff);
            color: #0c0c1d;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }

        .btn i {
            margin-right: 8px;
        }

        .info-item {
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
        }

        .info-item i {
            font-size: 1.5rem;
            color: #00ffff;
            margin-right: 15px;
            margin-top: 5px;
        }

        .info-content h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #00ffff;
        }

        .info-content p {
            color: #a0a0c0;
            line-height: 1.5;
        }

        .availability {
            background: rgba(0, 128, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #0080ff;
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: #00ffff;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: #00ffff;
            color: #0c0c1d;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Let's Connect!</h1>
            <p>Experience the high-tech glowing background and rotating border on hover</p>
        </div>
        
        <div class="contact-form">
            <h2><i class="fas fa-paper-plane"></i> Send Us A Message</h2>
            <form>
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Full Name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your.email@example.com">
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Type your detailed message here..."></textarea>
                </div>
                
                <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Send Message</button>
            </form>
        </div>
        
        <div class="contact-info">
            <h2><i class="fas fa-info-circle"></i> Get In Touch</h2>
            
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <div class="info-content">
                    <h3>Email Support</h3>
                    <p>Radha3.0@gmail.com</p>
                </div>
            </div>
            
            <div class="info-item">
                <i class="fas fa-phone"></i>
                <div class="info-content">
                    <h3>Phone Number</h3>
                    <p>+91 98765 XXXXX</p>
                </div>
            </div>
            
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <div class="info-content">
                    <h3>Office Address</h3>
                    <p>SISTEC-GN<br>Bhopal, India</p>
                </div>
            </div>
            
            <div class="availability">
                <div class="info-item">
                    <i class="fas fa-clock"></i>
                    <div class="info-content">
                        <h3>Availability</h3>
                        <p>Everyday : 5:00 PM to 12:00 AM IST</p>
                    </div>
                </div>
            </div>
            
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
    </div>

    <script>
        // Add interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            const formInputs = document.querySelectorAll('input, textarea');
            
            formInputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
            
            // Add button click effect
            const sendButton = document.querySelector('.btn');
            sendButton.addEventListener('click', function(e) {
                e.preventDefault();
                this.innerHTML = '<i class="fas fa-check"></i> Message Sent!';
                this.style.background = 'linear-gradient(90deg, #00ff88, #00cc66)';
                
                setTimeout(() => {
                    this.innerHTML = '<i class="fas fa-paper-plane"></i> Send Message';
                    this.style.background = 'linear-gradient(90deg, #00ffff, #0080ff)';
                }, 3000);
            });
        });
    </script>
</body>
</html>
